name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Clonar el repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Extraer versión del tag (v1.2.0 → 1.2.0)
      - name: Extraer versión
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      # 3. Instalar Python
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r requirements.txt pyinstaller

      # 5. Crear carpeta db vacía (PyInstaller la necesita)
      - name: Crear carpeta db
        run: New-Item -ItemType Directory -Force -Path db

      # 6. Actualizar local_version.json con la versión del tag
      - name: Actualizar local_version.json
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $today   = (Get-Date -Format "yyyy-MM-dd")
          @{ version = $version; build_date = $today } | ConvertTo-Json | Out-File -FilePath local_version.json -Encoding utf8NoBOM

      # 7. Compilar con PyInstaller
      - name: Compilar con PyInstaller
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name=StockManager `
            --icon=assets/logo.ico `
            "--add-data=local_version.json;." `
            "--add-data=db;db" `
            "--add-data=assets;assets" `
            main.py

      # 8. Instalar Inno Setup
      - name: Instalar Inno Setup
        run: choco install innosetup --yes

      # 9. Generar instalador con Inno Setup
      - name: Generar instalador
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss `
            /DMyAppVersion=${{ steps.version.outputs.VERSION }} `
            "/DOutputBaseFilename=StockManagerSetup_v${{ steps.version.outputs.VERSION }}"

      # 10. Calcular SHA-256 del instalador y actualizar version.json
      - name: Actualizar version.json
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag     = "v$version"
          $file    = "dist\StockManagerSetup_$tag.exe"
          $url     = "https://github.com/marcelojuarez/veterinary-stock-management/releases/download/$tag/StockManagerSetup_$tag.exe"
          $hash    = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          $today   = (Get-Date -Format "yyyy-MM-dd")

          $json = [ordered]@{
            version          = $version
            release_date     = $today
            release_notes    = "Ver notas en GitHub"
            installer_url    = $url
            checksum_sha256  = $hash
            mandatory        = $false
          } | ConvertTo-Json
          $json | Out-File -FilePath version.json -Encoding utf8NoBOM
          Write-Host "version.json actualizado: $version | SHA256: $hash"

      # 11. Commit y push de version.json actualizado
      - name: Commit version.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "release: actualizar version.json para v${{ steps.version.outputs.VERSION }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      # 12. Subir instalador al Release de GitHub
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/StockManagerSetup_v${{ steps.version.outputs.VERSION }}.exe
          name: Versión ${{ steps.version.outputs.VERSION }}
          body: Release automático generado por GitHub Actions
